# =============================================================================
# CONFIGURACIÓN DE NGINX - Reverse Proxy
#
# Este archivo le dice a Nginx cómo comportarse cuando recibe peticiones HTTP.
# Nginx escucha en el puerto 80 (el puerto HTTP estándar del mundo exterior)
# y reenvía cada petición a nuestra app Spring Boot que corre en el puerto 8080
# dentro de la red interna de Docker.
#
# Flujo de una petición:
#   Usuario → http://TU_IP → Nginx (puerto 80) → api:8080 → Spring Boot → respuesta
# =============================================================================

server {
    # Nginx escucha en el puerto 80, que es el puerto HTTP estándar.
    # Cuando el usuario escribe http://TU_IP (sin poner :puerto), el navegador
    # usa el puerto 80 por defecto. Por eso aquí lo escuchamos.
    listen 80;

    # El guion bajo "_" es un comodín: acepta peticiones de cualquier dominio o IP.
    # Si en el futuro tienes un dominio real (ej: miapi.com), lo pondrías aquí
    # en lugar del guion bajo.
    server_name _;

    # Toda petición que llegue (/) se redirige al servicio "api".
    location / {
        # "api" es el nombre del servicio definido en docker-compose.yml.
        # Docker Compose crea una red interna y resuelve "api" como la IP
        # del contenedor. No necesitamos saber la IP real, Docker lo gestiona.
        # El puerto 8080 es donde Spring Boot escucha dentro del contenedor.
        proxy_pass http://api:8080;

        # Usamos HTTP/1.1 para el proxy porque soporta keep-alive (conexiones
        # persistentes), lo que mejora el rendimiento al reutilizar conexiones TCP.
        proxy_http_version 1.1;

        # Estas cabeceras le informan a Spring Boot sobre la petición original.
        # Sin ellas, la app vería todas las peticiones como si vinieran de Nginx
        # y no del cliente real.

        # El dominio o IP que el usuario usó para llegar (ej: miapi.com o 190.x.x.x)
        proxy_set_header Host $host;

        # IP real del cliente (sin esto, Spring Boot solo vería la IP de Nginx)
        proxy_set_header X-Real-IP $remote_addr;

        # Lista completa del camino de proxies por el que pasó la petición.
        # Útil si en el futuro hay múltiples proxies encadenados.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Indica si la petición original era HTTP o HTTPS.
        # Importante si en el futuro activas SSL: Spring Boot puede saber
        # si debe generar URLs con https:// en vez de http://.
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
